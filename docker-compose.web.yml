services:
  service:
    build:
      context: .
      dockerfile: Dockerfile.service
    environment:
      PORT: 4010
      INKOS_PROJECT_ROOT: /data/project
    volumes:
      # Project workspace persisted on host:
      # books/, radar/, genres/, inkos.json, .env, exports...
      - ${HOME}/inkos-data/project:/data/project
      # Global InkOS config persisted on host: ~/.inkos/.env in container
      - ${HOME}/inkos-data/inkos-home:/root/.inkos
    ports:
      - "4010:4010"
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    environment:
      PORT: 3000
      INKOS_SERVICE_URL: http://service:4010
    depends_on:
      - service
    ports:
      - "13006:3000"
    restart: unless-stopped
